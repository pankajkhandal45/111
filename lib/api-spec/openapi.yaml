openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Chess Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: games
    description: Chess games
  - name: puzzles
    description: Chess puzzles
  - name: leaderboard
    description: Rankings
  - name: friends
    description: Social features
  - name: analysis
    description: Game analysis

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/guest:
    post:
      operationId: guestLogin
      tags: [auth]
      summary: Guest login
      responses:
        "200":
          description: Guest session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /users/{username}:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get user profile
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found

  /users/{username}/stats:
    get:
      operationId: getUserStats
      tags: [users]
      summary: Get user statistics
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"

  /users/me/profile:
    patch:
      operationId: updateProfile
      tags: [users]
      summary: Update own profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /games:
    get:
      operationId: listGames
      tags: [games]
      summary: List games for current user
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: timeControl
          in: query
          schema:
            type: string
            enum: [bullet, blitz, rapid, classical]
      responses:
        "200":
          description: List of games
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameSummary"

    post:
      operationId: createGame
      tags: [games]
      summary: Create a new game
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GameInput"
      responses:
        "201":
          description: Game created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"

  /games/{id}:
    get:
      operationId: getGame
      tags: [games]
      summary: Get game by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Game
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"
        "404":
          description: Not found

  /games/{id}/move:
    post:
      operationId: makeMove
      tags: [games]
      summary: Make a move
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveInput"
      responses:
        "200":
          description: Move made
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"

  /games/{id}/resign:
    post:
      operationId: resignGame
      tags: [games]
      summary: Resign from game
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Game resigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"

  /games/{id}/draw:
    post:
      operationId: offerDraw
      tags: [games]
      summary: Offer or accept draw
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Draw offered/accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"

  /games/{id}/analysis:
    get:
      operationId: getGameAnalysis
      tags: [analysis]
      summary: Get game analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Game analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameAnalysis"

  /games/active:
    get:
      operationId: getActiveGames
      tags: [games]
      summary: Get active games summary for homepage
      responses:
        "200":
          description: Active games count and recent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveGamesSummary"

  /puzzles/daily:
    get:
      operationId: getDailyPuzzle
      tags: [puzzles]
      summary: Get today's puzzle
      responses:
        "200":
          description: Daily puzzle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Puzzle"

  /puzzles:
    get:
      operationId: listPuzzles
      tags: [puzzles]
      summary: List puzzles
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [mate1, mate2, mate3, tactical, endgame]
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Puzzles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Puzzle"

  /puzzles/{id}/solve:
    post:
      operationId: solvePuzzle
      tags: [puzzles]
      summary: Submit puzzle solution
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PuzzleSolveInput"
      responses:
        "200":
          description: Puzzle result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PuzzleResult"

  /puzzles/streak:
    get:
      operationId: getPuzzleStreak
      tags: [puzzles]
      summary: Get current puzzle streak
      responses:
        "200":
          description: Streak info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PuzzleStreak"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get global leaderboard
      parameters:
        - name: timeControl
          in: query
          schema:
            type: string
            enum: [bullet, blitz, rapid, classical]
            default: blitz
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /friends:
    get:
      operationId: getFriends
      tags: [friends]
      summary: Get friends list
      responses:
        "200":
          description: Friends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendEntry"

  /friends/requests:
    get:
      operationId: getFriendRequests
      tags: [friends]
      summary: Get pending friend requests
      responses:
        "200":
          description: Friend requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendRequest"

    post:
      operationId: sendFriendRequest
      tags: [friends]
      summary: Send friend request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FriendRequestInput"
      responses:
        "201":
          description: Request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequest"

  /friends/requests/{id}/accept:
    post:
      operationId: acceptFriendRequest
      tags: [friends]
      summary: Accept friend request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Accepted

  /friends/requests/{id}/decline:
    post:
      operationId: declineFriendRequest
      tags: [friends]
      summary: Decline friend request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Declined

  /notifications:
    get:
      operationId: getNotifications
      tags: [users]
      summary: Get notifications
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [users]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked read

  /dashboard:
    get:
      operationId: getDashboard
      tags: [users]
      summary: Get homepage dashboard data
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RegisterInput:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 20
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, username, email, isGuest, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        isGuest:
          type: boolean
        avatar:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        role:
          type: string
          enum: [user, admin]
        createdAt:
          type: string
          format: date-time

    UserProfile:
      type: object
      required: [id, username, isGuest, createdAt, ratings]
      properties:
        id:
          type: integer
        username:
          type: string
        isGuest:
          type: boolean
        avatar:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        ratings:
          $ref: "#/components/schemas/Ratings"
        recentGames:
          type: array
          items:
            $ref: "#/components/schemas/GameSummary"

    ProfileUpdate:
      type: object
      properties:
        bio:
          type: string
        country:
          type: string
        avatar:
          type: string

    Ratings:
      type: object
      required: [bullet, blitz, rapid, classical]
      properties:
        bullet:
          type: integer
        blitz:
          type: integer
        rapid:
          type: integer
        classical:
          type: integer

    UserStats:
      type: object
      required: [totalGames, wins, losses, draws, winRate, accuracy, bestRating, currentStreak, puzzleRating]
      properties:
        totalGames:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        draws:
          type: integer
        winRate:
          type: number
        accuracy:
          type: number
        bestRating:
          type: integer
        currentStreak:
          type: integer
        puzzleRating:
          type: integer
        recentAccuracies:
          type: array
          items:
            type: number

    GameInput:
      type: object
      required: [timeControl, mode]
      properties:
        timeControl:
          type: string
          enum: [bullet1, bullet2, blitz3, blitz5, rapid10, rapid15, rapid30, classical60, custom]
        mode:
          type: string
          enum: [bot, local, online, private]
        botLevel:
          type: ["string", "null"]
          enum: [beginner, easy, intermediate, advanced, expert, master, grandmaster, "null"]
        initialTime:
          type: ["integer", "null"]
        increment:
          type: ["integer", "null"]
        roomCode:
          type: ["string", "null"]

    MoveInput:
      type: object
      required: [from, to]
      properties:
        from:
          type: string
        to:
          type: string
        promotion:
          type: ["string", "null"]

    Game:
      type: object
      required: [id, fen, pgn, status, timeControl, mode, whitePlayerId, blackPlayerId, createdAt]
      properties:
        id:
          type: integer
        fen:
          type: string
        pgn:
          type: string
        status:
          type: string
          enum: [waiting, active, finished, abandoned]
        result:
          type: ["string", "null"]
          enum: [white, black, draw, "null"]
        resultReason:
          type: ["string", "null"]
        timeControl:
          type: string
        mode:
          type: string
        whitePlayerId:
          type: integer
        blackPlayerId:
          type: ["integer", "null"]
        whiteTimeMs:
          type: ["integer", "null"]
        blackTimeMs:
          type: ["integer", "null"]
        moves:
          type: array
          items:
            $ref: "#/components/schemas/Move"
        roomCode:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GameSummary:
      type: object
      required: [id, status, timeControl, mode, createdAt]
      properties:
        id:
          type: integer
        status:
          type: string
        result:
          type: ["string", "null"]
        resultReason:
          type: ["string", "null"]
        timeControl:
          type: string
        mode:
          type: string
        whitePlayer:
          $ref: "#/components/schemas/PlayerInfo"
        blackPlayer:
          $ref: "#/components/schemas/PlayerInfo"
        accuracy:
          type: ["number", "null"]
        opening:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    PlayerInfo:
      type: object
      required: [id, username]
      properties:
        id:
          type: integer
        username:
          type: string
        avatar:
          type: ["string", "null"]
        rating:
          type: ["integer", "null"]

    Move:
      type: object
      required: [id, gameId, moveNumber, san, from, to, fen]
      properties:
        id:
          type: integer
        gameId:
          type: integer
        moveNumber:
          type: integer
        san:
          type: string
        from:
          type: string
        to:
          type: string
        promotion:
          type: ["string", "null"]
        fen:
          type: string
        timeTakenMs:
          type: ["integer", "null"]
        classification:
          type: ["string", "null"]
          enum: [brilliant, great, best, excellent, good, inaccuracy, mistake, blunder, "null"]

    GameAnalysis:
      type: object
      required: [gameId, accuracy, moveAnalysis]
      properties:
        gameId:
          type: integer
        accuracy:
          type: object
          required: [white, black]
          properties:
            white:
              type: number
            black:
              type: number
        opening:
          type: ["string", "null"]
        openingEco:
          type: ["string", "null"]
        moveAnalysis:
          type: array
          items:
            $ref: "#/components/schemas/MoveAnalysis"
        brilliantMoves:
          type: integer
        blunders:
          type: integer
        mistakes:
          type: integer
        inaccuracies:
          type: integer

    MoveAnalysis:
      type: object
      required: [moveNumber, san, classification, evaluation]
      properties:
        moveNumber:
          type: integer
        san:
          type: string
        from:
          type: string
        to:
          type: string
        classification:
          type: string
        evaluation:
          type: number
        bestMove:
          type: ["string", "null"]
        bestMoveSan:
          type: ["string", "null"]

    ActiveGamesSummary:
      type: object
      required: [activeCount, recentGames, onlinePlayers]
      properties:
        activeCount:
          type: integer
        onlinePlayers:
          type: integer
        recentGames:
          type: array
          items:
            $ref: "#/components/schemas/GameSummary"

    Puzzle:
      type: object
      required: [id, fen, solution, type, rating, title]
      properties:
        id:
          type: integer
        fen:
          type: string
        solution:
          type: array
          items:
            type: string
        type:
          type: string
          enum: [mate1, mate2, mate3, tactical, endgame]
        rating:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        isDaily:
          type: boolean

    PuzzleSolveInput:
      type: object
      required: [moves, solved, timeTakenMs]
      properties:
        moves:
          type: array
          items:
            type: string
        solved:
          type: boolean
        timeTakenMs:
          type: integer

    PuzzleResult:
      type: object
      required: [solved, ratingChange, newRating, streak]
      properties:
        solved:
          type: boolean
        ratingChange:
          type: integer
        newRating:
          type: integer
        streak:
          type: integer
        correctSolution:
          type: array
          items:
            type: string

    PuzzleStreak:
      type: object
      required: [current, best, lastSolvedAt]
      properties:
        current:
          type: integer
        best:
          type: integer
        lastSolvedAt:
          type: ["string", "null"]
          format: date-time

    LeaderboardEntry:
      type: object
      required: [rank, userId, username, rating, wins, losses, draws]
      properties:
        rank:
          type: integer
        userId:
          type: integer
        username:
          type: string
        avatar:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        rating:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        draws:
          type: integer
        winRate:
          type: number

    FriendEntry:
      type: object
      required: [id, username, isOnline]
      properties:
        id:
          type: integer
        username:
          type: string
        avatar:
          type: ["string", "null"]
        isOnline:
          type: boolean
        lastSeen:
          type: ["string", "null"]
          format: date-time
        ratings:
          $ref: "#/components/schemas/Ratings"

    FriendRequest:
      type: object
      required: [id, fromUser, status, createdAt]
      properties:
        id:
          type: integer
        fromUser:
          $ref: "#/components/schemas/PlayerInfo"
        toUser:
          $ref: "#/components/schemas/PlayerInfo"
        status:
          type: string
          enum: [pending, accepted, declined]
        createdAt:
          type: string
          format: date-time

    FriendRequestInput:
      type: object
      required: [username]
      properties:
        username:
          type: string

    Notification:
      type: object
      required: [id, type, message, isRead, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [friend_request, game_invite, game_result, system]
        message:
          type: string
        isRead:
          type: boolean
        data:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    DashboardData:
      type: object
      required: [ratings, recentGames, stats, dailyPuzzle]
      properties:
        ratings:
          $ref: "#/components/schemas/Ratings"
        recentGames:
          type: array
          items:
            $ref: "#/components/schemas/GameSummary"
        stats:
          $ref: "#/components/schemas/UserStats"
        dailyPuzzle:
          $ref: "#/components/schemas/Puzzle"
        unreadNotifications:
          type: integer
        onlineFriends:
          type: array
          items:
            $ref: "#/components/schemas/FriendEntry"
