services:
  - type: web
    name: chesshub
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/chess-platform run build && pnpm --filter @workspace/api-server run build
    startCommand: cd artifacts/api-server && pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_ROUTE_PREFIX
        value: /api
      - key: SESSION_SECRET
        generateValue: true
      # DATABASE_URL — optional.
      # Leave unset to use a local SQLite file (data lost on redeploy).
      # Set to a Turso libsql URL (libsql://xxx.turso.io?authToken=yyy)
      # for a free persistent database that survives redeploys.
